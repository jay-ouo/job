<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周英智的職涯探索入口</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a; /* 深色背景 */
            color: #f8fafc;
            font-family: "Microsoft JhengHei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .main-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }

        /* 導覽卡片樣式 */
        .nav-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2rem;
            text-decoration: none;
            transition: all 0.3s ease;
            display: block;
            height: 100%;
        }

        .nav-card:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            transform: translateY(-10px);
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .nav-card h3 {
            color: #fff;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .nav-card p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-container text-center">
        <h1>周英智 個人職涯專案作品集</h1>
        <p class="lead text-secondary mb-5">資管二B 411312375</p>

        <div class="row g-4">
            <div class="col-md-3">
                <a href="/career" class="nav-card">
                    <span class="icon">📊</span>
                    <h3>職涯測驗結果</h3>
                    <p>UCAN 興趣代碼分析</p>
                </a>
            </div>

            <div class="col-md-3">
                <a href="/job" class="nav-card">
                    <span class="icon">💼</span>
                    <h3>目標職位介紹</h3>
                    <p>MIS 相關職缺研究</p>
                </a>
            </div>

            <div class="col-md-3">
                <a href="/resume" class="nav-card">
                    <span class="icon">📝</span>
                    <h3>自傳履歷</h3>
                    <p>個人優勢與競爭力說明</p>
                </a>
            </div>

            <div class="col-md-3">
                <a href="/future" class="nav-card">
                    <span class="icon">🚀</span>
                    <h3>未來學習規劃</h3>
                    <p>大二後的修課與考照計畫</p>
                </a>
            </div>
        </div>
        
        <footer class="mt-5 pt-4 border-top border-secondary">
            <small class="text-muted">靜宜大學 資訊管理學系 | 網頁部署實作作業</small>
        </footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
